services:
  # ─────────────────────────────────────────
  # BACKEND (Node.js / Express)
  # ─────────────────────────────────────────
  backend:
    image: ghcr.io/ahsansuryana/silapor-backend:latest
    pull_policy: always
    container_name: silapor_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: https://silapor.nuxantara.site
      FRONTEND_URL: https://silapor.nuxantara.site
      GOOGLE_REDIRECT_URI: https://backend-silapor.nuxantara.site/api/auth/google/callback
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - silapor_net

  # ─────────────────────────────────────────
  # FRONTEND (Nginx static files)
  # ─────────────────────────────────────────
  frontend:
    image: ghcr.io/ahsansuryana/silapor-frontend:latest
    pull_policy: always
    container_name: silapor_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - silapor_net
    depends_on:
      - backend

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  silapor_net:
    driver: bridge
