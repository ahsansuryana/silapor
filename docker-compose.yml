services:
  # ─────────────────────────────────────────
  # BACKEND (Node.js / Express)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: silapor_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: https://silapor.nuxantara.site
      FRONTEND_URL: https://silapor.nuxantara.site
      GOOGLE_REDIRECT_URI: https://backend-silapor.nuxantara.site/api/auth/google/callback
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - silapor_net

  # ─────────────────────────────────────────
  # FRONTEND (React / Vite → Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BACKEND_URL: https://backend-silapor.nuxantara.site
        VITE_BASE_URL: https://silapor.nuxantara.site
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    container_name: silapor_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - silapor_net
    depends_on:
      - backend

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  silapor_net:
    driver: bridge
